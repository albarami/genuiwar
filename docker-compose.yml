services:
  postgres:
    image: postgres:16-alpine
    container_name: genuiwar-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: genuiwar
    volumes:
      - genuiwar-pgdata:/var/lib/postgresql/data
      - ./infra/docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: genuiwar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - genuiwar-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  genuiwar-pgdata:
  genuiwar-redis-data:
